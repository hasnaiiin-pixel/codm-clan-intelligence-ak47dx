<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CODM Clan Intelligence offline</title>
  <meta name="theme-color" content="#05070d" />
  <style>
    :root{color-scheme:dark} body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(255,42,90,.22),transparent 34%),radial-gradient(circle at 86% 4%,rgba(34,211,238,.18),transparent 32%),#05070d;color:#eef6ff;padding:22px}.card{max-width:520px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:rgba(15,23,42,.86);box-shadow:0 26px 70px rgba(0,0,0,.42);padding:26px}.logo{width:86px;height:86px;border-radius:24px;object-fit:cover;border:1px solid rgba(34,211,238,.28);box-shadow:0 0 34px rgba(34,211,238,.16)}h1{margin:18px 0 8px;font-size:32px;line-height:1.05}.muted{color:#a9b9cf;line-height:1.5}.btn{display:inline-flex;margin-top:18px;border-radius:16px;background:#ff2a2a;color:white;text-decoration:none;font-weight:900;padding:12px 16px}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/mirza-app-icon-192.png" alt="MIRZA" />
    <h1>Sei offline</h1>
    <p class="muted">CODM Clan Intelligence è installata come PWA. Alcune pagine già aperte restano disponibili; per sincronizzare eventi, utenti e statistiche serve connessione internet.</p>
    <a class="btn" href="/dashboard">Riprova dashboard</a>
  </main>
</body>
</html>
