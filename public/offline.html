<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CODM offline</title>
  <style>
    body{margin:0;background:#06070d;color:#f8fafc;font-family:Arial,sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px}
    main{max-width:620px;border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:24px;background:linear-gradient(135deg,rgba(8,145,178,.18),rgba(15,23,42,.96))}
    h1{margin:0 0 12px;font-size:30px} p{color:#cbd5e1;line-height:1.5} a{color:#67e8f9;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>CODM è offline</h1>
    <p>Da V8.1 gli eventi non vengono mai salvati localmente nella PWA. Per vedere, creare, modificare o cancellare eventi serve connessione al database Supabase.</p>
    <p>Quando torna internet, riapri <a href="/events">Eventi</a> o usa <a href="/cache-reset">Reset cache</a> se la PWA mostra una versione vecchia.</p>
  </main>
</body>
</html>
