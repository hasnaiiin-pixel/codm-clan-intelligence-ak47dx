<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080B12" />
    <title>CODM Clan Intelligence - Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #182238 0%, #080B12 48%, #03050A 100%);
        color: #F7FAFC;
      }
      .card {
        width: min(90vw, 440px);
        padding: 28px;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        background: rgba(8, 11, 18, .86);
        box-shadow: 0 24px 80px rgba(0,0,0,.45);
        text-align: center;
      }
      .logo {
        width: 74px;
        height: 74px;
        margin: 0 auto 18px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #ff304f, #6d5dfc);
        font-weight: 900;
        letter-spacing: .08em;
      }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0; color: #AAB4C4; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">M</div>
      <h1>Sei offline</h1>
      <p>CODM PWA continua a salvare i dati sul dispositivo. Quando torna internet, la sincronizzazione riparte automaticamente.</p>
    </main>
  </body>
</html>
